name: Builder

on:
  push:
    tags:
      - "golang/*"
      - "python/*"
      - "debian/*"
      - "golangci-lint/*"
  workflow_dispatch:

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get current date
        id: current_date
        run: |
          echo "day_time=$(TZ=Asia/Shanghai date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "detail_time=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Setup Node Version
        uses: actions/setup-node@v6
        with:
          node-version: 18.x

      - name: Get Semver Version
        id: get-version
        run: |
          npm install -g semver
          tag=$(git describe --abbrev=0 --tags)
          image_name=$(echo "$tag" | awk -F '/' '{print $1}')
          # 提取 tag 部分: golang/pay-1.26.2-20260415084007 -> pay-1.26.2-20260415084007
          tag_part=$(echo "$tag" | awk -F '/' '{print $2}')
          # 去掉时间戳后缀 (最后一个 - 后面的部分): pay-1.26.2-20260415084007 -> pay-1.26.2
          full_tag=$(echo "$tag_part" | rev | cut -d'-' -f2- | rev)
          # 检查第一部分是否是数字开头，判断是否为子目录模式
          first_part=$(echo "$full_tag" | cut -d'-' -f1)
          if [[ "$first_part" =~ ^[0-9] ]]; then
            # 普通模式: 1.26.2 -> build_context=golang, image_tag=1.26.2
            build_context="$image_name"
            image_tag="$full_tag"
            version_tag="$full_tag"
          else
            # 子目录模式: pay-1.26.2 -> build_context=golang/pay, image_tag=1.26.2-pay
            build_context="${image_name}/${first_part}"
            version_tag=$(echo "$full_tag" | sed "s/^${first_part}-//")
            image_tag="${version_tag}-${first_part}"
          fi
          echo "image_tag=${image_tag}" >> $GITHUB_ENV
          echo "image_name=${image_name}" >> $GITHUB_ENV
          echo "build_context=${build_context}" >> $GITHUB_ENV
          echo "version=$(semver --coerce ${version_tag})" >> $GITHUB_ENV
          echo "tag_length=$(grep -o '\.' <<< ${version_tag} | wc -l)" >> $GITHUB_ENV
          # base_version 用于 Dockerfile 中的 FROM 基础镜像版本
          echo "base_version=${version_tag}" >> $GITHUB_ENV

      - name: Semver Parse
        uses: terradatum/semver-action@main
        id: semver
        with:
          version: ${{ env.version }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}/${{ env.image_name }}
            verystar/${{ env.image_name }}
            registry.verystar.net/library/${{ env.image_name }}
          tags: |
            type=raw,value=${{ env.image_tag }}
            type=raw,value=${{ steps.semver.outputs.major }}.${{ steps.semver.outputs.minor }}
            type=raw,value=${{ steps.semver.outputs.major }},enable=${{ env.tag_length == 1 }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub Container Registry
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to ACR Container Registry
        uses: docker/login-action@v4
        with:
          registry: registry.verystar.net
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: "{{defaultContext}}:${{ env.build_context }}"
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ env.base_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # 成功通知
      - name: Failure Notify
        if: ${{ success() }}
        run: |
          curl 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${{ vars.WECOM_TOKEN }}' \
            -H 'Content-Type: application/json' \
            -d '
              {
                  "msgtype": "markdown",
                  "markdown": {
                    "content": "GitHub Actions<font color=\"info\">构建成功</font>\n
                       >仓库名称:<font color=\"comment\">verystar/containers</font>
                       >App名称:<font color=\"comment\">${{ env.image_name }}</font>
                       >App版本:<font color=\"comment\">${{ env.image_tag }}</font>
                       >报警信息:<font color=\"comment\">基础镜像构建成功</font>
                       >构建时间:<font color=\"comment\">${{ env.detail_time }}</font>"
                  }
              }'

      # 失败通知
      - name: Failure Notify
        if: ${{ failure() }}
        run: |
          curl 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${{ vars.WECOM_TOKEN }}' \
            -H 'Content-Type: application/json' \
            -d '
              {
                  "msgtype": "markdown",
                  "markdown": {
                    "content": "GitHub Actions<font color=\"warning\">执行失败</font>，请注意!\n
                       >仓库名称:<font color=\"comment\">verystar/containers</font>
                       >App名称:<font color=\"comment\">${{ env.image_name }}</font>
                       >App版本:<font color=\"comment\">${{ env.image_tag }}</font>
                       >报警信息:<font color=\"comment\">基础镜像构建失败</font>
                       >构建时间:<font color=\"comment\">${{ env.detail_time }}</font>"
                  }
              }'
