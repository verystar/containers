name: Builder

on:
  push:
    tags:
      - "golang/*"
      - "python/*"
      - "debian/*"
      - "nginx/*"
      - "golangci-lint/*"
  workflow_dispatch:
    inputs:
      tag:
        description: "指定构建的 tag（如 python/3.10.20-20260417）"
        required: true
        default: "python/3.10.20-20260417"

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.scan.outputs.targets }}
      image_name: ${{ steps.scan.outputs.image_name }}
      version: ${{ steps.scan.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Scan targets
        id: scan
        run: |
          # 根据触发方式获取 tag
          # push tag: 使用 github.ref_name
          # workflow_dispatch: 使用输入的 tag
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi

          # 提取镜像名称和版本号
          image_name=$(echo "$tag" | awk -F '/' '{print $1}')
          version=$(echo "$tag" | awk -F '/' '{print $2}' | rev | cut -d'-' -f2- | rev)

          # 构建 targets 数组：根目录 + 所有子目录
          targets="[]"

          # 检查根目录是否有 Dockerfile
          if [ -f "$image_name/Dockerfile" ]; then
            targets=$(echo "$targets" | jq -c '. + ["root"]')
          fi

          # 扫描子目录
          for dir in $(find "$image_name" -maxdepth 1 -type d ! -path "$image_name"); do
            if [ -f "$dir/Dockerfile" ]; then
              subdir=$(basename "$dir")
              targets=$(echo "$targets" | jq -c '. + ["'$subdir'"]')
            fi
          done

          echo "targets=${targets}" >> $GITHUB_OUTPUT
          echo "image_name=${image_name}" >> $GITHUB_OUTPUT
          echo "version=${version}" >> $GITHUB_OUTPUT

          # 调试输出
          echo "Targets: ${targets}"
          echo "Image name: ${image_name}"
          echo "Version: ${version}"

  build-and-push-image:
    needs: discover
    strategy:
      matrix:
        target: ${{ fromJson(needs.discover.outputs.targets) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Parse target
        run: |
          target="${{ matrix.target }}"
          image_name="${{ needs.discover.outputs.image_name }}"
          version="${{ needs.discover.outputs.version }}"

          if [ "$target" == "root" ]; then
            # 根目录：无后缀
            build_context="$image_name"
            image_tag="$version"
            suffix=""
          else
            # 子目录：带后缀
            build_context="${image_name}/${target}"
            image_tag="${version}-${target}"
            suffix="-${target}"
          fi

          echo "build_context=${build_context}" >> $GITHUB_ENV
          echo "image_tag=${image_tag}" >> $GITHUB_ENV
          echo "suffix=${suffix}" >> $GITHUB_ENV
          echo "version=${version}" >> $GITHUB_ENV

          # 调试输出
          echo "Target: ${target}"
          echo "Build context: ${build_context}"
          echo "Image tag: ${image_tag}"

      - name: Get current date
        run: |
          echo "detail_time=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Setup Node Version
        uses: actions/setup-node@v6
        with:
          node-version: 18.x

      - name: Get Semver
        run: |
          npm install -g semver
          echo "major=$(semver --coerce ${{ env.version }} | cut -d'.' -f1)" >> $GITHUB_ENV
          echo "minor=$(semver --coerce ${{ env.version }} | cut -d'.' -f2)" >> $GITHUB_ENV
          echo "tag_length=$(grep -o '\.' <<< ${version} | wc -l)" >> $GITHUB_ENV

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            # ghcr.io/${{ github.repository }}/${{ needs.discover.outputs.image_name }}
            # verystar/${{ needs.discover.outputs.image_name }}
            registry.verystar.net/library/${{ needs.discover.outputs.image_name }}
          tags: |
            type=raw,value=${{ env.image_tag }}
            type=raw,value=${{ env.major }}.${{ env.minor }}${{ env.suffix }}
            type=raw,value=${{ env.major }}${{ env.suffix }},enable=${{ env.tag_length == 1 }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # - name: Login to GitHub Container Registry
      #   uses: docker/login-action@v4
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      # - name: Login to DockerHub Container Registry
      #   uses: docker/login-action@v4
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to ACR Container Registry
        uses: docker/login-action@v4
        with:
          registry: registry.verystar.net
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: "{{defaultContext}}:${{ env.build_context }}"
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ needs.discover.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Success Notify
        if: ${{ success() }}
        run: |
          curl 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${{ vars.WECOM_TOKEN }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "msgtype": "markdown",
              "markdown": {
                "content": "GitHub Actions<font color=\"info\">构建成功</font>\n
                   >仓库名称:<font color=\"comment\">verystar/containers</font>
                   >App名称:<font color=\"comment\">${{ needs.discover.outputs.image_name }}</font>
                   >App版本:<font color=\"comment\">${{ env.image_tag }}</font>
                   >构建目录:<font color=\"comment\">${{ env.build_context }}</font>
                   >构建时间:<font color=\"comment\">${{ env.detail_time }}</font>"
              }
            }'

      - name: Failure Notify
        if: ${{ failure() }}
        run: |
          curl 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${{ vars.WECOM_TOKEN }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "msgtype": "markdown",
              "markdown": {
                "content": "GitHub Actions<font color=\"warning\">执行失败</font>\n
                   >仓库名称:<font color=\"comment\">verystar/containers</font>
                   >App名称:<font color=\"comment\">${{ needs.discover.outputs.image_name }}</font>
                   >App版本:<font color=\"comment\">${{ env.image_tag }}</font>
                   >构建目录:<font color=\"comment\">${{ env.build_context }}</font>
                   >构建时间:<font color=\"comment\">${{ env.detail_time }}</font>"
              }
            }'
